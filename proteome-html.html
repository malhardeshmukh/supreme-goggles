<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AlphaFold Human Proteome Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#070d1a}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const COLORS = {
  vhigh: "#00f5d4", high: "#3a86ff", medium: "#ffb703", low: "#ff6b6b",
  bg: "#070d1a", card: "#0e1829", border: "#1a2d4a", text: "#e0eaff", muted: "#5a7a9a",
};

const proteomeData = {
  totalResidues: 10537122,
  bands: [
    { label: "Very High (pLDDT 90–100)", pct: 35.7, color: COLORS.vhigh, desc: "Side chains frequently correctly oriented" },
    { label: "High (pLDDT 70–90)", pct: 22.3, color: COLORS.high, desc: "Generally correct backbone prediction" },
    { label: "Low (pLDDT 50–70)", pct: 18.2, color: COLORS.medium, desc: "Use with caution" },
    { label: "Very Low (pLDDT <50)", pct: 23.8, color: COLORS.low, desc: "Likely disordered in isolation" },
  ],
  coverage: { predicted: 98.5, confident: 58.0, veryHigh: 35.7 },
};

const goTerms = [
  { term: "Catalytic activity", confident: 0.64, templated: 0.38 },
  { term: "Protein binding", confident: 0.60, templated: 0.35 },
  { term: "Metal ion binding", confident: 0.57, templated: 0.33 },
  { term: "Nucleic acid binding", confident: 0.48, templated: 0.28 },
  { term: "Plasma membrane", confident: 0.52, templated: 0.20 },
  { term: "Integral membrane", confident: 0.50, templated: 0.18 },
  { term: "Organelle membrane", confident: 0.55, templated: 0.25 },
  { term: "Cytosol", confident: 0.63, templated: 0.36 },
  { term: "Nucleoplasm", confident: 0.58, templated: 0.30 },
  { term: "Nucleus", confident: 0.60, templated: 0.31 },
];

const caseStudies = [
  { id: "g6pase", name: "Glucose-6-Phosphatase α", uniprot: "P35575", pLDDT: 95.5, color: COLORS.vhigh, type: "Membrane enzyme", insight: "9-helix topology with solvent-accessible active site tunnel. Novel Glu110 residue identified as potential gating mechanism for blood sugar regulation.", icon: "⬡" },
  { id: "dgat2", name: "DGAT2", uniprot: "Q96PD7", pLDDT: 95.9, color: COLORS.vhigh, type: "Acyltransferase", insight: "Binding pocket identified for inhibitor PF-06424439. Catalytic residues His163 & Glu243 conserved across species — drug target for fatty liver disease.", icon: "◈" },
  { id: "wolframin", name: "Wolframin", uniprot: "O76024", pLDDT: 81.7, color: COLORS.high, type: "ER protein", insight: "OB-fold domain with unique cysteine-rich region predicted to form 3 disulfide bridges — absent in closest known structure (PDB 3F1Z). Wolfram syndrome target.", icon: "◇" },
];

function AnimatedCounter({ target, suffix = "", duration = 1200 }) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    let start = null;
    const step = (ts) => {
      if (!start) start = ts;
      const prog = Math.min((ts - start) / duration, 1);
      const ease = 1 - Math.pow(1 - prog, 3);
      setVal(+(target * ease).toFixed(1));
      if (prog < 1) ref.current = requestAnimationFrame(step);
    };
    ref.current = requestAnimationFrame(step);
    return () => cancelAnimationFrame(ref.current);
  }, [target, duration]);
  return <span>{val}{suffix}</span>;
}

function DonutChart({ data }) {
  const size = 220, r = 80, cx = size / 2, cy = size / 2;
  let cumAngle = -Math.PI / 2;
  const slices = data.bands.map((b) => {
    const angle = (b.pct / 100) * 2 * Math.PI;
    const x1 = cx + r * Math.cos(cumAngle), y1 = cy + r * Math.sin(cumAngle);
    cumAngle += angle;
    const x2 = cx + r * Math.cos(cumAngle), y2 = cy + r * Math.sin(cumAngle);
    return { ...b, d: `M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${angle > Math.PI ? 1 : 0},1 ${x2},${y2} Z`, midAngle: cumAngle - angle / 2 };
  });
  const [hov, setHov] = useState(null);
  return (
    <div style={{ position: "relative", display: "inline-block" }}>
      <svg width={size} height={size}>
        <circle cx={cx} cy={cy} r={r + 6} fill="none" stroke={COLORS.border} strokeWidth={1} />
        {slices.map((s, i) => (
          <path key={i} d={s.d} fill={s.color} opacity={hov === null || hov === i ? 1 : 0.3}
            style={{ cursor: "pointer", transition: "opacity 0.2s" }}
            onMouseEnter={() => setHov(i)} onMouseLeave={() => setHov(null)} />
        ))}
        <circle cx={cx} cy={cy} r={46} fill={COLORS.bg} />
        <text x={cx} y={cy - 8} textAnchor="middle" fill={COLORS.text} fontSize={20} fontWeight="700" fontFamily="monospace">
          {hov !== null ? `${slices[hov].pct}%` : "58%"}
        </text>
        <text x={cx} y={cy + 12} textAnchor="middle" fill={COLORS.muted} fontSize={9} fontFamily="monospace">
          {hov !== null ? "of residues" : "CONFIDENT"}
        </text>
      </svg>
    </div>
  );
}

function GoBar({ item }) {
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
        <span style={{ color: COLORS.text, fontSize: 12, fontFamily: "monospace" }}>{item.term}</span>
        <span style={{ color: COLORS.vhigh, fontSize: 11, fontFamily: "monospace" }}>{Math.round(item.confident * 100)}%</span>
      </div>
      <div style={{ background: COLORS.border, borderRadius: 2, height: 6, position: "relative" }}>
        <div style={{ background: COLORS.muted, width: `${item.templated * 100}%`, height: "100%", borderRadius: 2, position: "absolute" }} />
        <div style={{ background: COLORS.vhigh, width: `${item.confident * 100}%`, height: "100%", borderRadius: 2, opacity: 0.8 }} />
      </div>
    </div>
  );
}

function ProteinCard({ p, active, onClick }) {
  return (
    <div onClick={onClick} style={{ background: active ? `${p.color}12` : COLORS.card, border: `1px solid ${active ? p.color : COLORS.border}`, borderRadius: 8, padding: "14px 16px", cursor: "pointer", transition: "all 0.2s", marginBottom: 10 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
        <span style={{ fontSize: 22, color: p.color }}>{p.icon}</span>
        <div>
          <div style={{ color: COLORS.text, fontWeight: 700, fontSize: 14, fontFamily: "monospace" }}>{p.name}</div>
          <div style={{ color: COLORS.muted, fontSize: 11, fontFamily: "monospace" }}>{p.uniprot} · {p.type}</div>
        </div>
        <div style={{ marginLeft: "auto", textAlign: "right" }}>
          <div style={{ color: p.color, fontWeight: 700, fontSize: 18, fontFamily: "monospace" }}>{p.pLDDT}</div>
          <div style={{ color: COLORS.muted, fontSize: 9 }}>median pLDDT</div>
        </div>
      </div>
      {active && (
        <div style={{ color: COLORS.text, fontSize: 12, lineHeight: 1.6, marginTop: 8, paddingTop: 8, borderTop: `1px solid ${COLORS.border}`, fontFamily: "Georgia, serif" }}>
          {p.insight}
        </div>
      )}
    </div>
  );
}

function MoleculeBackground() {
  const nodes = Array.from({ length: 28 }, (_, i) => ({
    x: 5 + (i % 7) * 14 + (Math.floor(i / 7) % 2) * 7,
    y: 8 + Math.floor(i / 7) * 22,
  }));
  return (
    <svg style={{ position: "absolute", inset: 0, width: "100%", height: "100%", opacity: 0.04, pointerEvents: "none" }} viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
      {nodes.map((a, i) => nodes.slice(i + 1).map((b, j) => {
        const dist = Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
        if (dist > 16) return null;
        return <line key={`${i}-${j}`} x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke={COLORS.vhigh} strokeWidth="0.3" />;
      }))}
      {nodes.map((n, i) => <circle key={i} cx={n.x} cy={n.y} r="1.2" fill={COLORS.vhigh} />)}
    </svg>
  );
}

function App() {
  const [activeCase, setActiveCase] = useState(null);
  const [tab, setTab] = useState("overview");

  return (
    <div style={{ background: COLORS.bg, minHeight: "100vh", color: COLORS.text, fontFamily: "'Courier New', monospace", position: "relative", overflow: "hidden" }}>
      <MoleculeBackground />

      <div style={{ position: "relative", padding: "32px 32px 20px", borderBottom: `1px solid ${COLORS.border}` }}>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 16, flexWrap: "wrap" }}>
          <div>
            <div style={{ color: COLORS.muted, fontSize: 10, letterSpacing: "0.2em", marginBottom: 4 }}>ALPHAFOLD · NATURE 2021 · TUNYASUVUNAKOOL ET AL.</div>
            <h1 style={{ margin: 0, fontSize: "clamp(20px, 4vw, 32px)", fontWeight: 900, letterSpacing: "-0.02em", color: COLORS.text, fontFamily: "Georgia, serif" }}>
              Human Proteome<br /><span style={{ color: COLORS.vhigh }}>Structure Map</span>
            </h1>
          </div>
          <div style={{ marginLeft: "auto", display: "flex", gap: 24 }}>
            {[{ label: "Proteins Predicted", val: 98.5, suffix: "%" }, { label: "Confident Residues", val: 58.0, suffix: "%" }, { label: "GPU Days Used", val: 930, suffix: "" }].map((s) => (
              <div key={s.label} style={{ textAlign: "right" }}>
                <div style={{ fontSize: "clamp(18px, 3vw, 28px)", fontWeight: 700, color: COLORS.vhigh }}>
                  <AnimatedCounter target={s.val} suffix={s.suffix} />
                </div>
                <div style={{ fontSize: 9, color: COLORS.muted, letterSpacing: "0.1em" }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{ display: "flex", gap: 4, marginTop: 20 }}>
          {["overview", "go-terms", "case-studies"].map((t) => (
            <button key={t} onClick={() => setTab(t)} style={{ background: tab === t ? COLORS.vhigh : "transparent", color: tab === t ? COLORS.bg : COLORS.muted, border: `1px solid ${tab === t ? COLORS.vhigh : COLORS.border}`, borderRadius: 4, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "monospace", letterSpacing: "0.1em", textTransform: "uppercase", transition: "all 0.15s" }}>
              {t.replace("-", " ")}
            </button>
          ))}
        </div>
      </div>

      <div style={{ padding: 32, position: "relative" }}>
        {tab === "overview" && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24, maxWidth: 900 }}>
            <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: 24 }}>
              <div style={{ color: COLORS.muted, fontSize: 10, letterSpacing: "0.15em", marginBottom: 16 }}>RESIDUE CONFIDENCE DISTRIBUTION</div>
              <div style={{ display: "flex", gap: 20, alignItems: "center", flexWrap: "wrap" }}>
                <DonutChart data={proteomeData} />
                <div style={{ flex: 1, minWidth: 140 }}>
                  {proteomeData.bands.map((b, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                      <div style={{ width: 10, height: 10, borderRadius: 2, background: b.color, flexShrink: 0 }} />
                      <div>
                        <div style={{ color: COLORS.text, fontSize: 11 }}>{b.pct}%</div>
                        <div style={{ color: COLORS.muted, fontSize: 9, lineHeight: 1.3 }}>{b.label.split("(")[0].trim()}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: 24 }}>
              <div style={{ color: COLORS.muted, fontSize: 10, letterSpacing: "0.15em", marginBottom: 16 }}>STRUCTURAL COVERAGE COMPARISON</div>
              {[
                { label: "AlphaFold Very High (pLDDT >90)", val: 35.7, color: COLORS.vhigh },
                { label: "AlphaFold Confident (pLDDT >70)", val: 58.0, color: COLORS.high },
                { label: "Experimental PDB Coverage", val: 17.0, color: COLORS.low },
                { label: "Proteins with >75% confident residues", val: 43.8, color: COLORS.medium },
              ].map((item) => (
                <div key={item.label} style={{ marginBottom: 14 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ color: COLORS.text, fontSize: 11 }}>{item.label}</span>
                    <span style={{ color: item.color, fontWeight: 700, fontSize: 12 }}>{item.val}%</span>
                  </div>
                  <div style={{ background: COLORS.border, borderRadius: 2, height: 8 }}>
                    <div style={{ background: item.color, width: `${item.val}%`, height: "100%", borderRadius: 2, opacity: 0.85 }} />
                  </div>
                </div>
              ))}
              <div style={{ marginTop: 16, padding: "10px 12px", background: `${COLORS.vhigh}10`, border: `1px solid ${COLORS.vhigh}40`, borderRadius: 6 }}>
                <span style={{ color: COLORS.vhigh, fontSize: 11 }}>AlphaFold provides <strong>2×</strong> more high-confidence structural coverage than all experimental structures combined.</span>
              </div>
            </div>
            <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: 24, gridColumn: "1 / -1" }}>
              <div style={{ color: COLORS.muted, fontSize: 10, letterSpacing: "0.15em", marginBottom: 16 }}>pLDDT ACCURACY INTERPRETATION</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
                {proteomeData.bands.map((b, i) => (
                  <div key={i} style={{ background: `${b.color}10`, border: `1px solid ${b.color}50`, borderRadius: 8, padding: 14 }}>
                    <div style={{ color: b.color, fontWeight: 700, fontSize: 24, marginBottom: 4 }}>{b.pct}%</div>
                    <div style={{ color: COLORS.text, fontSize: 11, marginBottom: 6 }}>{b.label.split("(")[0]}</div>
                    <div style={{ color: COLORS.muted, fontSize: 10, lineHeight: 1.5 }}>{b.desc}</div>
                    <div style={{ color: b.color, fontSize: 10, marginTop: 6 }}>{b.label.match(/\(([^)]+)\)/)?.[1]}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {tab === "go-terms" && (
          <div style={{ maxWidth: 700 }}>
            <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: 24 }}>
              <div style={{ color: COLORS.muted, fontSize: 10, letterSpacing: "0.15em", marginBottom: 8 }}>RESIDUE COVERAGE BY GO TERM</div>
              <div style={{ display: "flex", gap: 16, marginBottom: 20 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <div style={{ width: 12, height: 6, background: COLORS.vhigh, borderRadius: 1, opacity: 0.8 }} />
                  <span style={{ color: COLORS.muted, fontSize: 11 }}>AlphaFold confident (pLDDT &gt;70)</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <div style={{ width: 12, height: 6, background: COLORS.muted, borderRadius: 1 }} />
                  <span style={{ color: COLORS.muted, fontSize: 11 }}>Templated (&gt;50% identity)</span>
                </div>
              </div>
              {goTerms.map((item) => <GoBar key={item.term} item={item} />)}
              <div style={{ marginTop: 20, color: COLORS.muted, fontSize: 11, lineHeight: 1.6, padding: "12px 14px", background: `${COLORS.high}10`, borderRadius: 6, border: `1px solid ${COLORS.high}30` }}>
                Membrane proteins (Plasma membrane, Integral membrane) gain the most novel structural coverage — historically challenging for experimental methods.
              </div>
            </div>
          </div>
        )}

        {tab === "case-studies" && (
          <div style={{ maxWidth: 860 }}>
            <div style={{ color: COLORS.muted, fontSize: 11, marginBottom: 16 }}>De novo predictions (no template with &gt;25% sequence identity over 20% of sequence). Click a protein to expand.</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, alignItems: "start" }}>
              <div>
                {caseStudies.map((p) => (
                  <ProteinCard key={p.id} p={p} active={activeCase === p.id} onClick={() => setActiveCase(activeCase === p.id ? null : p.id)} />
                ))}
              </div>
              <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: 20 }}>
                <div style={{ color: COLORS.muted, fontSize: 10, letterSpacing: "0.15em", marginBottom: 14 }}>CONFIDENCE SCALE</div>
                <div style={{ position: "relative", height: 20, borderRadius: 4, background: `linear-gradient(to right, ${COLORS.low}, ${COLORS.medium}, ${COLORS.high}, ${COLORS.vhigh})`, marginBottom: 8 }} />
                <div style={{ display: "flex", justifyContent: "space-between", color: COLORS.muted, fontSize: 10 }}>
                  <span>0 (low)</span><span>50</span><span>70</span><span>90</span><span>100 (high)</span>
                </div>
                <div style={{ marginTop: 24, color: COLORS.muted, fontSize: 10, letterSpacing: "0.1em" }}>MULTI-DOMAIN STATS (pTM &gt; 0.8)</div>
                <div style={{ marginTop: 12, display: "flex", gap: 12 }}>
                  {[{ val: "187", label: "proteins with pTM >0.8" }, { val: "343", label: "proteins with pTM >0.7" }, { val: "1,290", label: "novel structure predictions" }].map((s) => (
                    <div key={s.label} style={{ flex: 1, background: `${COLORS.high}15`, border: `1px solid ${COLORS.high}30`, borderRadius: 6, padding: "10px 8px", textAlign: "center" }}>
                      <div style={{ color: COLORS.high, fontWeight: 700, fontSize: 18, fontFamily: "monospace" }}>{s.val}</div>
                      <div style={{ color: COLORS.muted, fontSize: 9, lineHeight: 1.4, marginTop: 4 }}>{s.label}</div>
                    </div>
                  ))}
                </div>
                <div style={{ marginTop: 20, color: COLORS.muted, fontSize: 10, letterSpacing: "0.1em" }}>DISORDER PREDICTION</div>
                <div style={{ marginTop: 10 }}>
                  {[{ label: "pLDDT as disorder predictor", auc: "0.897" }, { label: "Exp. resolved head (AlphaFold)", auc: "0.921" }].map((d) => (
                    <div key={d.label} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${COLORS.border}` }}>
                      <span style={{ color: COLORS.text, fontSize: 11 }}>{d.label}</span>
                      <span style={{ color: COLORS.vhigh, fontWeight: 700, fontSize: 12 }}>AUC {d.auc}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}
      </div>

      <div style={{ padding: "12px 32px", borderTop: `1px solid ${COLORS.border}`, color: COLORS.muted, fontSize: 10, letterSpacing: "0.1em" }}>
        SOURCE: TUNYASUVUNAKOOL ET AL. · NATURE 596, 590–596 (2021) · DOI:10.1038/s41586-021-03828-1
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
